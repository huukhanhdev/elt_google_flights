version: 2

models:
  - name: cheapest_routes
    description: "Per-route daily price ranking with window function comparisons"
    columns:
      - name: origin
        tests: [not_null]
      - name: destination
        tests: [not_null]
      - name: departure_date
        tests: [not_null]
      - name: price_usd
        tests: [not_null]
      - name: price_rank
        description: "1 = cheapest offer for this route+day"
        tests: [not_null]

  - name: price_trends
    description: "Day-over-day average price movement per route using LAG()"
    columns:
      - name: origin
        tests: [not_null]
      - name: destination
        tests: [not_null]
      - name: departure_date
        tests: [not_null]
      - name: run_date
        tests: [not_null]
      - name: avg_price_usd
        tests: [not_null]
